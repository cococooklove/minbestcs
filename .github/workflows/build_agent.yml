name: Build MinBestAgent

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller "python-socketio[client]" python-dotenv websocket-client requests certifi playwright openpyxl
      - name: Install Playwright browsers
        run: playwright install chromium
      - name: Build Mac executable
        run: pyinstaller MinBestAgent.spec
      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinBestAgent-Mac
          path: dist/MinBestAgent

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller "python-socketio[client]" python-dotenv websocket-client requests certifi playwright openpyxl
      - name: Install Playwright browsers
        run: playwright install chromium
      - name: Build Windows executable
        run: pyinstaller MinBestAgent.spec
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinBestAgent-Windows
          path: dist/MinBestAgent.exe
