name: Build MinBestAgent

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller "python-socketio[client]" python-dotenv websocket-client requests certifi playwright openpyxl
      - name: Install Playwright Chromium
        run: playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ./playwright-browsers
      - name: Build Mac executable
        run: pyinstaller MinBestAgent.spec
      - name: Copy browsers to dist
        run: cp -r playwright-browsers dist/playwright-browsers
      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinBestAgent-Mac
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller "python-socketio[client]" python-dotenv websocket-client requests certifi playwright openpyxl
      - name: Install Playwright Chromium
        run: playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ./playwright-browsers
      - name: Build Windows executable
        run: pyinstaller MinBestAgent.spec
      - name: Copy browsers to dist
        run: Copy-Item -Recurse playwright-browsers dist\playwright-browsers
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinBestAgent-Windows
          path: dist/
